# Build and publish compiled artifacts (manual trigger, Windows only).
name: build_artifacts
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build_windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install build dependencies
      run: |
        git clone https://github.com/libyal/vstools.git ..\vstools
    - name: Build from source
      run: |
        .\synclibs.ps1 -UseHead
        .\autogen.ps1
        .\build.ps1 -VisualStudioVersion 2022 -Configuration Release -Platform x64 -PythonPath ${{ env.pythonLocation }} -VSToolsOptions "--extend-with-x64 --no-python-dll"
    - name: Collect binaries
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null
        Get-ChildItem -Path . -Recurse -Include *.dll,*.exe,*.lib |
          Where-Object { $_.FullName -match 'Release|x64' } |
          Copy-Item -Destination artifacts -Force
        Compress-Archive -Path artifacts\* -DestinationPath libfsrefs-windows-x64.zip -Force
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: libfsrefs-windows-x64
        path: libfsrefs-windows-x64.zip
        retention-days: 30
